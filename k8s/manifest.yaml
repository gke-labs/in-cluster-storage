apiVersion: storage.k8s.io/v1
kind: CSIDriver
metadata:
  name: agentfs.labs.gke.io
spec:
  attachRequired: false
  podInfoOnMount: true
  volumeLifecycleModes:
    - Ephemeral

---

apiVersion: v1
kind: ServiceAccount
metadata:
  name: agentfs-node-daemon
  namespace: kube-agentfs-system

---

kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: agentfs-node-daemon-role
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["persistentvolumes"]
    verbs: ["get", "list", "watch"]

---

kind: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: agentfs-node-daemon-binding
subjects:
  - kind: ServiceAccount
    name: agentfs-node-daemon
    namespace: kube-agentfs-system
roleRef:
  kind: ClusterRole
  name: agentfs-node-daemon-role
  apiGroup: rbac.authorization.k8s.io

---

apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: agentfs-node-daemon
  namespace: kube-agentfs-system
spec:
  selector:
    matchLabels:
      app: agentfs-node-daemon
  template:
    metadata:
      labels:
        app: agentfs-node-daemon
    spec:
      serviceAccountName: agentfs-node-daemon
      containers:
        - name: node-driver-registrar
          image: registry.k8s.io/sig-storage/csi-node-driver-registrar:v2.13.0
          args:
            - "--v=5"
            - "--csi-address=$(ADDRESS)"
            - "--kubelet-registration-path=$(DRIVER_REG_SOCK_PATH)"
          env:
            - name: ADDRESS
              value: /csi/csi.sock
            - name: DRIVER_REG_SOCK_PATH
              value: /var/lib/kubelet/plugins/agentfs.labs.gke.io/csi.sock
          volumeMounts:
            - name: socket-dir
              mountPath: /csi
            - name: registration-dir
              mountPath: /registration
        - name: agentfs-node-daemon
          securityContext:
            privileged: true
            capabilities:
              add: ["SYS_ADMIN"]
          image: agentfs-node-daemon:latest # Should be updated with real image
          args:
            - "--v=5"
            - "--endpoint=unix:///csi/csi.sock"
            - "--nodeid=$(NODE_ID)"
            - "--storage-path=/var/lib/agentfs"
            - "--controller-address=agentfs-controller:50051"
          env:
            - name: NODE_ID
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          volumeMounts:
            - name: socket-dir
              mountPath: /csi
            - name: kubelet-dir
              mountPath: /var/lib/kubelet
              mountPropagation: "Bidirectional"
            - name: storage-dir
              mountPath: /var/lib/agentfs
              mountPropagation: "Bidirectional"
      volumes:
        - name: socket-dir
          hostPath:
            path: /var/lib/kubelet/plugins/agentfs.labs.gke.io/
            type: DirectoryOrCreate
        - name: registration-dir
          hostPath:
            path: /var/lib/kubelet/plugins_registry/
            type: Directory
        - name: kubelet-dir
          hostPath:
            path: /var/lib/kubelet
            type: Directory
        - name: storage-dir
          hostPath:
            path: /var/lib/agentfs
            type: DirectoryOrCreate

---

apiVersion: v1
kind: Service
metadata:
  name: agentfs-controller
  namespace: kube-agentfs-system
spec:
  selector:
    app: agentfs-controller
  ports:
    - port: 50051
      targetPort: 50051

---

apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: agentfs-controller
  namespace: kube-agentfs-system
spec:
  serviceName: agentfs-controller
  replicas: 1
  selector:
    matchLabels:
      app: agentfs-controller
  template:
    metadata:
      labels:
        app: agentfs-controller
    spec:
      containers:
        - name: agentfs-controller
          image: agentfs-controller:latest # Should be updated with real image
          args:
            - "--v=5"
            - "--data-path=/data"
          ports:
            - containerPort: 50051
          volumeMounts:
            - name: data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi

---

