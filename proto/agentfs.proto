syntax = "proto3";

package agentfs.v1alpha1;

option go_package = "github.com/gke-labs/in-cluster-storage/pkg/api/v1alpha1;v1alpha1";

import "google/protobuf/timestamp.proto";

service AgentFSController {
  rpc GetLatestSnapshot(GetLatestSnapshotRequest) returns (GetLatestSnapshotResponse);
  rpc UploadSnapshot(UploadSnapshotRequest) returns (UploadSnapshotResponse);
  rpc UploadBlob(stream UploadBlobRequest) returns (UploadBlobResponse);
  rpc DownloadBlob(DownloadBlobRequest) returns (stream DownloadBlobResponse);
  rpc HasBlob(HasBlobRequest) returns (HasBlobResponse);
}

message GetLatestSnapshotRequest {
  string volume_id = 1;
}

message GetLatestSnapshotResponse {
  SnapshotMetadata snapshot = 1;
}

message UploadSnapshotRequest {
  string volume_id = 1;
  SnapshotMetadata snapshot = 2;
}

message UploadSnapshotResponse {
  bool success = 1;
}

message SnapshotMetadata {
  repeated FileMetadata files = 1;
}

message FileMetadata {
  string path = 1;
  uint32 mode = 2;
  int64 size = 3;
  google.protobuf.Timestamp mod_time = 4;
  string sha256 = 5;
}

message UploadBlobRequest {
  oneof data {
    string sha256 = 1;
    bytes content = 2;
  }
}

message UploadBlobResponse {
  bool success = 1;
}

message DownloadBlobRequest {
  string sha256 = 1;
}

message DownloadBlobResponse {
  bytes content = 1;
}

message HasBlobRequest {
  string sha256 = 1;
}

message HasBlobResponse {
  bool exists = 1;
}
